<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VitaNusa AI | Nusa AI</title>
  <meta name="description" content="Nusa AI membantu edukasi kesehatan secara amanah. Bukan pengganti diagnosis atau konsultasi tenaga kesehatan profesional.">
  <link rel="stylesheet" href="assets/css/nusa-app-shell.css?v=20260626-langfit-green-chat-v1">
</head>
<body class="nusa-chat-page">
  <main id="main" class="nusa-home-chat" aria-labelledby="nusa-chat-title">
    <div class="nusa-chat-shell">
      <div class="nusa-chat-intro">
        <div class="nusa-chat-brand" aria-label="VitaNusa AI">VitaNusa AI</div>
        <h1 id="nusa-chat-title">Assalamualaikum, saya Nusa AI.<br>Apa yang ingin kamu pahami hari ini?</h1>
      </div>

      <div class="nusa-chat-panel" data-nusa-chat aria-label="Chat Nusa AI">
        <div class="nusa-chat-window" data-nusa-chat-log role="log" aria-live="polite" aria-relevant="additions" hidden></div>

        <form class="nusa-chat-form" data-nusa-chat-form>
          <label class="sr-only" for="nusaChatInput">Tulis pertanyaanmu di sini</label>
          <input id="nusaChatInput" data-nusa-chat-input type="text" autocomplete="off" placeholder="Tulis pertanyaanmu di sini..." aria-label="Tulis pertanyaanmu di sini">
          <button class="nusa-chat-submit" type="submit" aria-label="Kirim pertanyaan">
            <span aria-hidden="true">↑</span>
          </button>
        </form>

        <p class="nusa-chat-note">Nusa AI bersifat edukatif, bukan pengganti diagnosis atau konsultasi tenaga kesehatan profesional.</p>
      </div>
    </div>
  </main>

  <script type="module">
    import { initNusaChat } from './assets/js/modules/nusa-chat.js?v=20260627-github-article-source-v1';
    document.documentElement.classList.add('js-ready');
    initNusaChat();
  </script>
</body>
</html>
