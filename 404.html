<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halaman Tidak Ditemukan | VitaNusa AI</title>
  <meta name="robots" content="noindex">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f6fbf7;color:#143d2c;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center}
    main{max-width:560px;padding:28px;border:1px solid rgba(22,163,74,.16);border-radius:24px;background:#fff;box-shadow:0 18px 44px rgba(20,83,45,.09)}
    h1{margin:0 0 10px;font-size:clamp(2rem,7vw,3.4rem);line-height:1}
    p{margin:0 0 18px;color:#5d7168;line-height:1.65}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 16px;border-radius:999px;background:#18734f;color:#fff;font-weight:850;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Halaman tidak ditemukan. Jika kamu sedang membuka VitaGame dari link lama, halaman akan diarahkan otomatis.</p>
    <a href="/VitaNusa-AI/index.html">Kembali ke VitaNusa AI</a>
  </main>
  <script>
    (() => {
      const path = window.location.pathname.replace(/\/+/g, '/');
      const lowerPath = path.toLowerCase();
      const isLegacyVitaGame = lowerPath.endsWith('/vitagame.html/') || lowerPath.endsWith('/vitagame.html/index.html');

      if (isLegacyVitaGame) {
        const target = `${window.location.origin}/VitaNusa-AI/vitagame.html${window.location.search}${window.location.hash}`;
        window.location.replace(target);
      }
    })();
  </script>
</body>
</html>
