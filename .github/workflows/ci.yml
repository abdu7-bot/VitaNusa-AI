name: VitaNusa CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository safety
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check suspicious Unicode controls
        run: python scripts/check_suspicious_unicode.py

      - name: Check tracked code for merge conflict markers
        shell: bash
        run: |
          set -euo pipefail

          if git grep -n -E '^(<<<<<<<|=======|>>>>>>>)' -- \
            '*.js' '*.py' '*.html' '*.css' '*.json' '*.yml' '*.yaml'; then
            echo "::error::Merge conflict markers were found in tracked code or configuration files."
            exit 1
          fi

          echo "No merge conflict markers found in tracked code or configuration files."

      - name: Check gitlinks and submodule declarations
        shell: bash
        run: |
          set -euo pipefail

          gitlink_entries="$(git ls-files --stage | awk '$1 == "160000" { print }')"
          if [[ -z "$gitlink_entries" ]]; then
            echo "No tracked gitlinks found."
            exit 0
          fi

          echo "$gitlink_entries"

          if [[ ! -f .gitmodules ]]; then
            echo "::error::Tracked gitlinks exist, but .gitmodules is missing."
            exit 1
          fi

          declared_paths="$({
            git config -f .gitmodules --get-regexp '^submodule\..*\.path$' \
              | awk '{ print $2 }'
          })"

          while read -r _mode _sha _stage path; do
            if ! grep -Fxq "$path" <<< "$declared_paths"; then
              echo "::error::Gitlink '$path' is not declared in .gitmodules."
              exit 1
            fi
          done <<< "$gitlink_entries"

          git submodule status --recursive
          echo "All tracked gitlinks have matching .gitmodules declarations."

      - name: Check tracked filenames for common secrets
        shell: bash
        run: |
          set -euo pipefail

          sensitive_files=()
          while IFS= read -r -d '' file; do
            basename="${file##*/}"
            lower_basename="${basename,,}"

            if [[ "$lower_basename" == ".env.example" ]]; then
              continue
            fi

            case "$lower_basename" in
              .env|.env.local|.env.production|.env.*|*.pem|*.key|*secret*|*credentials*)
                sensitive_files+=("$file")
                ;;
            esac
          done < <(git ls-files -z)

          if (( ${#sensitive_files[@]} > 0 )); then
            for file in "${sensitive_files[@]}"; do
              echo "::error file=$file::Potentially sensitive file is tracked."
            done
            exit 1
          fi

          echo "No commonly sensitive filenames are tracked."

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run check

      - name: Test admin access logic
        run: npm run test:admin-auth

      - name: Test admin management logic
        run: npm run test:admin-management

      - name: Test public user auth logic
        run: npm run test:user-auth

      - name: Test VitaCheck history logic
        run: npm run test:vitacheck-history

      - name: Test Android PWA and Nusa Agent
        run: npm run test:android-pwa

      - name: Test Firestore security rules
        run: npm run test:firestore-rules

      - name: Check important JavaScript syntax
        run: |
          node --check admin/admin-access.js
          node --check admin/firebase-auth.js
          node --check admin/admin-management.js
          node --check admin/admin.js
          node --check service-worker.js
          node --check assets/js/modules/user-auth.js
          node --check assets/js/modules/vitacheck-history.js
          node --check assets/js/modules/nusa-chat.js
          node --check assets/js/modules/nusa-knowledge.js
          node --check assets/js/modules/nusa-ui-shell.js
          node --check assets/js/modules/pwa-install.js
          node --check assets/js/modules/nusa-agent.js
          node --check assets/js/modules/share-target.js
          node --check assets/js/modules/chat-viewport.js
          node --check assets/js/modules/vitacheck.js

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile and import backend
        run: |
          python -m compileall app tests
          python -c "from app.main import app; print(app.title)"

      - name: Run hierarchy policy unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run backend smoke tests
        shell: bash
        run: |
          set -euo pipefail

          log_file="${RUNNER_TEMP}/vitanusa-uvicorn.log"
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 >"$log_file" 2>&1 &
          server_pid=$!

          cleanup() {
            if kill -0 "$server_pid" 2>/dev/null; then
              kill "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          server_ready=false
          for _attempt in {1..30}; do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "::error::Uvicorn exited before becoming ready."
              cat "$log_file"
              exit 1
            fi

            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=1)" \
              >/dev/null 2>&1; then
              server_ready=true
              break
            fi

            sleep 1
          done

          if [[ "$server_ready" != "true" ]]; then
            echo "::error::Uvicorn did not become ready within 30 attempts."
            cat "$log_file"
            exit 1
          fi

          python tests/ci_smoke_test.py
          python tests/policy_http_smoke_test.py
