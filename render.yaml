services:
  - type: web
    name: vitanusa-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --no-proxy-headers
    plan: free
    envVars:
      - key: VITANUSA_ALLOWED_ORIGINS
        value: https://abdu7-bot.github.io,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5500
      - key: VITANUSA_TRUSTED_PROXY_IPS
        sync: false
