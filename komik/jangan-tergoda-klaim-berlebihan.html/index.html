<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VitaStory | VitaNusa AI</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#07130f;color:#eef8f1;line-height:1.6}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .top{position:sticky;top:0;z-index:5;background:#07130fe8;border-bottom:1px solid #ffffff20;backdrop-filter:blur(12px)}
    .nav{width:min(94%,1100px);margin:auto;min-height:62px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .brand{display:flex;align-items:center;gap:.65rem;font-weight:900}
    .brand img{width:42px;height:42px;object-fit:contain;background:#fff;border-radius:12px;padding:3px}
    .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#18734f;color:#fff;padding:.65rem .95rem;font-weight:800}
    main{width:min(94%,980px);margin:auto;padding:28px 0 42px}
    .hero{margin-bottom:1rem;padding:1rem;border:1px solid #ffffff20;border-radius:22px;background:#0f241c}
    h1{margin:.2rem 0;font-size:clamp(1.6rem,5vw,3rem);line-height:1.05}
    .note{color:#c7ddcf;margin:.4rem 0 0}
    .panels{display:grid;gap:1rem}
    figure{margin:0;padding:.6rem;border:1px solid #ffffff20;border-radius:22px;background:#0f241c;box-shadow:0 18px 50px #0006}
    figure img{width:100%;height:auto;border-radius:16px;background:#fff;object-fit:contain}
    figcaption{padding:.55rem .25rem 0;color:#c7ddcf;font-weight:800}
    footer{padding:24px 0;text-align:center;color:#c7ddcf}
    @media(max-width:680px){.nav{width:92%}.brand small{display:none}main{width:100%;padding-top:0}.hero,figure{border-radius:0;border-left:0;border-right:0}.btn{padding:.55rem .75rem}}
  </style>
</head>
<body>
  <header class="top">
    <div class="nav">
      <a class="brand" href="../../index.html#vitastory">
        <img src="../../images/logo-vitanusa-Ai.png" alt="Logo VitaNusa AI">
        <span>VitaNusa AI<br><small>VitaStory</small></span>
      </a>
      <a class="btn" href="../../index.html#vitastory">Kembali</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <p>VitaStory</p>
      <h1>Jangan Tergoda Klaim Berlebihan!</h1>
      <p class="note">Halaman ini sekarang memanggil file panel dalam format PNG.</p>
    </section>

    <section class="panels" aria-label="Panel komik VitaStory">
      <figure>
        <img src="../jangan-tergoda-klaim-berlebihan/panel-1.png" alt="Panel 1 komik VitaStory">
        <figcaption>Panel 1</figcaption>
      </figure>
      <figure>
        <img src="../jangan-tergoda-klaim-berlebihan/panel-2.png" alt="Panel 2 komik VitaStory">
        <figcaption>Panel 2</figcaption>
      </figure>
      <figure>
        <img src="../jangan-tergoda-klaim-berlebihan/panel-3.png" alt="Panel 3 komik VitaStory">
        <figcaption>Panel 3</figcaption>
      </figure>
      <figure>
        <img src="../jangan-tergoda-klaim-berlebihan/panel-4.png" alt="Panel 4 komik VitaStory">
        <figcaption>Panel 4</figcaption>
      </figure>
      <figure>
        <img src="../jangan-tergoda-klaim-berlebihan/panel-5.png" alt="Panel 5 komik VitaStory">
        <figcaption>Panel 5</figcaption>
      </figure>
    </section>
  </main>

  <footer>VitaNusa AI</footer>
</body>
</html>
