<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="t d"><title id="t">Panel 1</title><desc id="d">Alya melihat iklan produk kesehatan dan mulai panik</desc><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07130f"/><stop offset="1" stop-color="#18734f"/></linearGradient></defs><rect width="900" height="1200" fill="url(#g)"/><rect x="55" y="70" width="790" height="1060" rx="46" fill="#fff"/><text x="100" y="155" fill="#18734f" font-family="Arial" font-size="38" font-weight="900">Panel 1</text><text x="100" y="245" fill="#09251e" font-family="Arial" font-size="58" font-weight="900">Beli dengan ilmu,</text><text x="100" y="315" fill="#09251e" font-family="Arial" font-size="58" font-weight="900">bukan karena panik</text><circle cx="450" cy="560" r="155" fill="#eef8f1" stroke="#dbe8df" stroke-width="8"/><text x="260" y="560" fill="#0f3d2e" font-family="Arial" font-size="42" font-weight="900">Alya melihat iklan</text><rect x="105" y="790" width="690" height="190" rx="28" fill="#fff4d6"/><text x="145" y="875" fill="#5d4210" font-family="Arial" font-size="36" font-weight="800">“Stok terbatas? Aku harus</text><text x="145" y="925" fill="#5d4210" font-family="Arial" font-size="36" font-weight="800">beli sekarang!”</text></svg>