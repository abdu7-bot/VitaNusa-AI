<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">Panel 3 - Kak Nusa mengingatkan</title>
  <desc id="desc">Kak Nusa mengingatkan bahwa informasi kesehatan perlu dicek dengan tenang dan tidak terburu-buru.</desc>
  <rect width="1080" height="1440" fill="#eef8f1"/>
  <rect x="54" y="54" width="972" height="1332" rx="56" fill="#ffffff" stroke="#dbe8df" stroke-width="6"/>
  <rect x="110" y="105" width="860" height="150" rx="36" fill="#0f3d2e"/>
  <text x="150" y="190" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="56" font-weight="900" fill="#ffe0a4">Panel 3</text>
  <text x="150" y="245" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="34" fill="#eef8f1">Berhenti sejenak, cek dulu</text>
  <circle cx="320" cy="500" r="98" fill="#ffe0a4"/>
  <path d="M215 755c34-128 176-128 210 0" fill="#18734f"/>
  <circle cx="760" cy="500" r="98" fill="#dff4e8"/>
  <path d="M655 755c34-128 176-128 210 0" fill="#0f3d2e"/>
  <path d="M455 475h170" stroke="#18734f" stroke-width="26" stroke-linecap="round"/>
  <path d="M560 425l70 50-70 50" fill="none" stroke="#18734f" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="165" y="950" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="42" font-weight="850" fill="#0f3d2e">Kak Nusa mengingatkan:</text>
  <text x="165" y="1012" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="36" fill="#293a31">informasi kesehatan harus dicek,</text>
  <text x="165" y="1066" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="36" fill="#293a31">bukan ditelan mentah-mentah.</text>
  <rect x="165" y="1180" width="750" height="92" rx="46" fill="#fff4d6"/>
  <text x="205" y="1238" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#5d4210">Tenang itu bagian dari cerdas.</text>
</svg>
