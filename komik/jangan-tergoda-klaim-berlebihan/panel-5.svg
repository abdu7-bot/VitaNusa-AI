<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">Panel 5 - Pilih dengan ilmu</title>
  <desc id="desc">Kesimpulan komik: pilih produk dengan ilmu, bukan karena panik atau tergoda janji instan.</desc>
  <rect width="1080" height="1440" fill="#07130f"/>
  <rect x="54" y="54" width="972" height="1332" rx="56" fill="#0f241c" stroke="#ffffff" stroke-opacity="0.16" stroke-width="6"/>
  <rect x="110" y="105" width="860" height="150" rx="36" fill="#18734f"/>
  <text x="150" y="190" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="56" font-weight="900" fill="#ffe0a4">Panel 5</text>
  <text x="150" y="245" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="34" fill="#eef8f1">Pilih dengan ilmu</text>
  <circle cx="540" cy="535" r="190" fill="#ffe0a4" opacity="0.95"/>
  <path d="M455 535l58 58 126-142" fill="none" stroke="#0f3d2e" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="230" cy="395" r="65" fill="#ffffff" opacity="0.10"/>
  <circle cx="850" cy="735" r="92" fill="#ffffff" opacity="0.10"/>
  <text x="150" y="915" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="48" font-weight="900" fill="#ffffff">Kesimpulan:</text>
  <text x="150" y="1000" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="39" fill="#eef8f1">pilih produk dengan ilmu,</text>
  <text x="150" y="1062" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="39" fill="#eef8f1">bukan karena panik atau janji instan.</text>
  <rect x="150" y="1180" width="780" height="98" rx="49" fill="#ffe0a4"/>
  <text x="197" y="1241" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="31" font-weight="850" fill="#09251e">Amanah dalam memilih, selamat dalam melangkah.</text>
</svg>
