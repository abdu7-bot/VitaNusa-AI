<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">Panel 2 - Testimoni membuat hampir percaya</title>
  <desc id="desc">Testimoni dan bahasa promosi membuat Alya hampir percaya tanpa memeriksa informasi lebih lanjut.</desc>
  <rect width="1080" height="1440" fill="#fff4d6"/>
  <rect x="54" y="54" width="972" height="1332" rx="56" fill="#ffffff" stroke="#ead7a5" stroke-width="6"/>
  <rect x="110" y="105" width="860" height="150" rx="36" fill="#18734f"/>
  <text x="150" y="190" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="56" font-weight="900" fill="#ffe0a4">Panel 2</text>
  <text x="150" y="245" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="34" fill="#eef8f1">Testimoni belum tentu bukti</text>
  <g transform="translate(150 365)">
    <rect width="780" height="112" rx="32" fill="#eef8f1"/>
    <circle cx="62" cy="56" r="32" fill="#18734f"/>
    <rect x="122" y="30" width="360" height="22" rx="11" fill="#0f3d2e" opacity="0.35"/>
    <rect x="122" y="66" width="590" height="20" rx="10" fill="#18734f" opacity="0.25"/>
  </g>
  <g transform="translate(150 520)">
    <rect width="780" height="112" rx="32" fill="#eef8f1"/>
    <circle cx="62" cy="56" r="32" fill="#18734f"/>
    <rect x="122" y="30" width="460" height="22" rx="11" fill="#0f3d2e" opacity="0.35"/>
    <rect x="122" y="66" width="520" height="20" rx="10" fill="#18734f" opacity="0.25"/>
  </g>
  <g transform="translate(150 675)">
    <rect width="780" height="112" rx="32" fill="#eef8f1"/>
    <circle cx="62" cy="56" r="32" fill="#18734f"/>
    <rect x="122" y="30" width="410" height="22" rx="11" fill="#0f3d2e" opacity="0.35"/>
    <rect x="122" y="66" width="610" height="20" rx="10" fill="#18734f" opacity="0.25"/>
  </g>
  <text x="165" y="950" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="42" font-weight="850" fill="#0f3d2e">Komentar ramai membuat</text>
  <text x="165" y="1012" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="36" fill="#293a31">Alya hampir percaya begitu saja.</text>
  <rect x="165" y="1125" width="750" height="120" rx="42" fill="#0f3d2e"/>
  <text x="205" y="1182" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="30" font-weight="850" fill="#ffe0a4">Ingat:</text>
  <text x="205" y="1228" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="28" fill="#eef8f1">viral tidak selalu benar.</text>
</svg>
