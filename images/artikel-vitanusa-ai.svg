<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Banner artikel VitaNusa AI</title>
  <desc id="desc">Banner artikel AI untuk edukasi kesehatan VitaNusa AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef8f1"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff4d6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="54" fill="url(#bg)"/>
  <circle cx="1020" cy="150" r="160" fill="#18734f" opacity="0.10"/>
  <circle cx="155" cy="610" r="205" fill="#ffe0a4" opacity="0.42"/>
  <g transform="translate(95 110)">
    <rect width="430" height="500" rx="38" fill="#ffffff" stroke="#dbe8df" stroke-width="4"/>
    <rect x="42" y="50" width="345" height="52" rx="26" fill="#18734f" opacity="0.95"/>
    <rect x="42" y="138" width="300" height="26" rx="13" fill="#0f3d2e" opacity="0.22"/>
    <rect x="42" y="190" width="345" height="20" rx="10" fill="#18734f" opacity="0.28"/>
    <rect x="42" y="228" width="310" height="20" rx="10" fill="#18734f" opacity="0.24"/>
    <rect x="42" y="266" width="338" height="20" rx="10" fill="#18734f" opacity="0.20"/>
    <rect x="42" y="334" width="190" height="58" rx="29" fill="#ffe0a4"/>
    <text x="76" y="371" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="24" font-weight="850" fill="#09251e">Artikel</text>
  </g>
  <g transform="translate(585 195)">
    <text x="0" y="0" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="42" font-weight="900" fill="#18734f">Artikel Pilihan</text>
    <text x="0" y="76" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="62" font-weight="900" fill="#0f3d2e">AI untuk</text>
    <text x="0" y="146" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="62" font-weight="900" fill="#0f3d2e">Edukasi Kesehatan</text>
    <text x="0" y="212" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="25" fill="#52645b">Teknologi membantu menjelaskan, bukan menggantikan tenaga kesehatan.</text>
  </g>
