<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Banner komik VitaStory</title>
  <desc id="desc">Banner komik edukatif VitaNusa AI tentang klaim kesehatan berlebihan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07130f"/>
      <stop offset="50%" stop-color="#0f3d2e"/>
      <stop offset="100%" stop-color="#18734f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="54" fill="url(#bg)"/>
  <circle cx="1020" cy="130" r="145" fill="#ffe0a4" opacity="0.16"/>
  <circle cx="150" cy="610" r="210" fill="#ffffff" opacity="0.09"/>
  <g transform="translate(95 110)">
    <rect width="330" height="500" rx="34" fill="#fff4d6"/>
    <rect x="30" y="34" width="270" height="138" rx="24" fill="#18734f"/>
    <rect x="30" y="200" width="270" height="120" rx="24" fill="#ffffff"/>
    <rect x="30" y="348" width="270" height="118" rx="24" fill="#ffffff"/>
