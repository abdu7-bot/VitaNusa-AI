<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>VitaNusa AI Admin Login</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page admin-login-page">
  <main class="admin-login-shell" id="main">
    <section class="admin-login-card" aria-labelledby="loginTitle">
      <p class="admin-kicker">Phase 2</p>
      <h1 id="loginTitle">VitaNusa AI Admin</h1>
      <p class="admin-lead">Panel admin statis untuk pratinjau alur pengelolaan konten VitaNusa AI.</p>

      <div class="admin-alert admin-alert-warning" role="status">
        Login Google Firebase akan diaktifkan pada Phase 3.
      </div>

      <div class="admin-alert" role="status">
        Skeleton ini belum menulis data, belum membaca Firestore, dan belum mengunggah file.
      </div>

      <button class="admin-button admin-button-primary admin-placeholder" type="button" aria-disabled="true" data-placeholder="Login Firebase belum aktif pada Phase 2.">
        Login dengan Google
      </button>

      <div class="admin-login-links" aria-label="Tautan admin">
        <a href="../index.html">Kembali ke Website Publik</a>
        <a href="index.html">Preview Dashboard</a>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
